<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback & Complaints - Belhar Community Transport</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f3d2e, #1f7a5c, #34a853);
  color: #fff;
  min-height: 100vh;
}

/* GLASS */
.glass {
  background: rgba(34, 197, 94, 0.12);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* NAV */
nav {
  width: 90%;
  margin: 20px auto;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-header img {
  height: 50px;
}

.logo-header h1 {
  font-size: 18px;
  font-weight: 700;
}

.back-link {
  text-decoration: none;
  color: #fff;
  font-weight: bold;
}

/* CONTENT */
.container {
  width: 90%;
  margin: 30px auto;
  padding: 30px;
}

.container h2 {
  margin-bottom: 10px;
}

.container p {
  margin-bottom: 20px;
  line-height: 1.6;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

label {
  font-weight: bold;
}

input, select, textarea {
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
}

textarea {
  min-height: 120px;
  resize: vertical;
}

button {
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ffffff;
  color: #0f3d2e;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #e5e5e5;
}

/* MOBILE */
@media(max-width: 768px) {
  nav {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .container {
    padding: 20px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="glass">
  <div class="logo-header">
    <img src="images/Logo.png" alt="logo">
    <h1>FEEDBACK & COMPLAINTS</h1>
  </div>

  <a href="index.html" class="back-link">← Back</a>
</nav>

<!-- CONTENT -->
<section class="container glass">

  <h2>We value your input</h2>
  <p>
    Please use this form to send us your feedback or lodge a complaint.
    All submissions are sent directly to management via WhatsApp.
  </p>

  <form id="feedbackForm">

    <label>Name:</label>
    <input type="text" id="name" required>

    <label>Contact Number:</label>
    <input type="tel" id="contact" required>

    <label>Type:</label>
    <select id="type" required>
      <option value="">-- Select --</option>
      <option value="Feedback">Feedback</option>
      <option value="Complaint">Complaint</option>
    </select>

    <label>Driver:</label>
    <input type="text" id="driver" placeholder="Optional">

    <label>Message:</label>
    <textarea id="message" required></textarea>

    <button type="submit">Submit</button>

  </form>

</section>

<script>
document.getElementById("feedbackForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const contact = document.getElementById("contact").value;
  const type = document.getElementById("type").value;
  const driver = document.getElementById("driver").value;
  const message = document.getElementById("message").value;

  const whatsappNumber = "27798526921";

  const fullMessage =
`*New ${type} Submission - Belhar Community Transport*

Name: ${name}
Contact: ${contact}
Type: ${type}
Driver: ${driver ? driver : "N/A"}

Message:
${message}`;

  const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(fullMessage)}`;

  window.open(url, "_blank");
});
</script>

</body>
</html>
